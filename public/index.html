<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Label Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;400&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: #fff;
            -webkit-font-smoothing: antialiased;
        }

        .minimal-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
        }

        .input-minimal {
            background: transparent;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding: 0.75rem 0;
            width: 100%;
            outline: none;
            transition: 0.4s;
            color: #fff;
            font-weight: 200;
        }

        .input-minimal:focus { border-bottom-color: #fff; }

        .btn-generate {
            background: #fff;
            color: #000;
            padding: 1.25rem;
            border-radius: 2rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-generate:active { transform: scale(0.96); opacity: 0.9; }
        .btn-generate:disabled { background: #333; color: #666; cursor: not-allowed; }

        #bar { transition: width 0.4s ease; }
    </style>
</head>
<body class="min-h-screen p-6 flex items-center justify-center">

    <div class="max-w-md w-full minimal-card p-10 shadow-2xl relative overflow-hidden">
        <header class="text-center mb-10">
            <h1 class="text-xl font-extralight tracking-[0.5em] uppercase">Design <span class="font-normal text-slate-400 italic">Agent</span></h1>
            <div class="h-[1px] w-12 bg-white/20 mx-auto mt-4"></div>
        </header>

        <div class="space-y-8">
            <div class="group">
                <p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 mb-1">Značka (Název)</p>
                <input type="text" id="compName" value="SETOS" class="input-minimal uppercase tracking-[0.2em]">
            </div>

            <div class="group">
                <p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 mb-1">Činnost firmy (Vize pro AI)</p>
                <textarea id="compDesc" rows="2" class="input-minimal text-sm" placeholder="Např. Pokročilé technologie, čistá energie, kybernetika..."></textarea>
            </div>

            <div class="group">
                <p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 mb-1">Cílový odkaz (QR)</p>
                <input type="text" id="qrLink" value="https://www.setos.cz" class="input-minimal text-xs font-light">
            </div>

            <div class="relative py-4 border border-dashed border-white/20 text-center cursor-pointer hover:bg-white/5 transition rounded-xl">
                <input type="file" id="logoInput" accept="image/png" class="absolute inset-0 opacity-0 cursor-pointer">
                <p id="uploadText" class="text-[10px] uppercase tracking-[0.2em] font-light text-slate-400">Připojit Logo (PNG)</p>
                <div id="logoStore" data-blob="" class="hidden"></div>
            </div>

            <button onclick="runDesigner()" id="genBtn" class="btn-generate w-full text-[10px] mt-2">
                Generovat Kolekci (3x)
            </button>

            <div id="loader" class="hidden mt-6 text-center">
                <div class="w-full bg-white/10 h-[2px] mb-3 rounded-full overflow-hidden">
                    <div id="bar" class="bg-white h-[2px] w-0"></div>
                </div>
                <p id="status" class="text-[9px] font-light text-slate-400 uppercase tracking-[0.3em] animate-pulse">Navazuji spojení...</p>
            </div>
        </div>
    </div>

    <div id="qr-hidden" class="hidden"></div>

    <script>
        const { jsPDF } = window.jspdf;

        // --- 1. Zpracování nahrávaného loga ---
        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 400; canvas.height = 400;
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0,0,400,400);
                    const s = Math.min(380/img.width, 380/img.height);
                    ctx.drawImage(img, (400-img.width*s)/2, (400-img.height*s)/2, img.width*s, img.height*s);
                    document.getElementById('logoStore').setAttribute('data-blob', canvas.toDataURL('image/png'));
                    document.getElementById('uploadText').innerText = "Logo Připraveno ✓";
                    document.getElementById('uploadText').classList.replace('text-slate-400', 'text-white');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // --- 2. Zabezpečené volání backendu ---
        async function fetchDesign(desc, name) {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ description: desc, companyName: name })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "Chyba na serveru.");
            return data;
        }

        // --- 3. Hlavní logika generování ---
        async function runDesigner() {
            const btn = document.getElementById('genBtn');
            const bar = document.getElementById('bar');
            const statusLabel = document.getElementById('status');
            const name = document.getElementById('compName').value || "BRAND";
            const desc = document.getElementById('compDesc').value || "Abstract design";
            const qrUrl = document.getElementById('qrLink').value || "https://example.com";
            const logoData = document.getElementById('logoStore').getAttribute('data-blob');

            btn.disabled = true;
            document.getElementById('loader').classList.remove('hidden');
            bar.style.width = "5%";

            try {
                // SEKVENČNÍ ZPRACOVÁNÍ
                const results = [];
                for (let i = 0; i < 3; i++) {
                    statusLabel.innerText = `Generování návrhu ${i + 1} ze 3 (fal.ai)...`;
                    const res = await fetchDesign(desc, name);
                    results.push(res);
                    bar.style.width = `${(i + 1) * 30}%`;
                }

                statusLabel.innerText = "Sestavuji produkční PDF...";

                // Generování čistého QR kódu
                const qrDiv = document.getElementById('qr-hidden');
                qrDiv.innerHTML = "";
                new QRCode(qrDiv, { text: qrUrl, width: 300, height: 300, colorDark: "#000000", colorLight: "#ffffff" });
                await new Promise(r => setTimeout(r, 500));
                const qrImg = qrDiv.querySelector('canvas').toDataURL("image/png");

                // Vytvoření PDF
                const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [200, 50] });

                results.forEach((res, i) => {
                    if (i > 0) doc.addPage([200, 50], 'l');

                    // A) AI Grafické pozadí
                    doc.addImage(res.imageUrl, 'JPEG', 0, 0, 165, 50);

                    // B) Bílá informační zóna (35mm šířka, vpravo)
                    doc.setFillColor(255, 255, 255);
                    doc.rect(165, 0, 35, 50, 'F');
                    doc.setDrawColor(240, 240, 240);
                    doc.setLineWidth(0.2);
                    doc.line(165, 0, 165, 50);

                    // C) Extrémně minimalistická typografie názvu
                    let fSize = 22;
                    if (name.length > 10) fSize = 16;
                    doc.setTextColor(255, 255, 255);
                    doc.setFont("helvetica", "normal");
                    doc.setFontSize(fSize);
                    doc.text(name.toUpperCase(), 20, 28, { charSpace: 6 }); // Vycentrováno na osu Y

                    // Podtitulek (DESIGN SYSTEM...) je záměrně smazán pro ultra čistý vzhled

                    // D) Zpracování Loga
                    if (logoData) {
                        doc.saveGraphicsState();
                        doc.setGState(new doc.GState({ opacity: 0.85 }));
                        doc.addImage(logoData, 'PNG', 135, 15, 18, 18);
                        doc.restoreGraphicsState();
                    }

                    // E) Formátování pravé info zóny - POUZE QR KÓD
                    // Zvětšen na 18x18 mm a dokonale vycentrován v pravé bílé zóně
                    doc.addImage(qrImg, 'PNG', 173.5, 26, 18, 18);

                    // Všechny rušivé texty (odkaz, AUTHENTIC QUALITY) jsou smazány
                });

                bar.style.width = "100%";
                doc.save(`${name.toUpperCase()}_Label_Collection.pdf`);

            } catch (err) {
                console.error(err);
                alert(`Proces přerušen:\n${err.message}`);
            } finally {
                btn.disabled = false;
                document.getElementById('loader').classList.add('hidden');
                bar.style.width = "0%";
            }
        }
    </script>
</body>
</html>
