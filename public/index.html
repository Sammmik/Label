<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Label Studio - Final Resolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; }
        .minimal-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; }
        .input-minimal { background: transparent; border-bottom: 1px solid rgba(255,255,255,0.2); width: 100%; outline: none; color: #fff; padding: 0.5rem 0; }
    </style>
</head>
<body class="min-h-screen p-6 flex items-center justify-center">

    <div class="max-w-md w-full minimal-card p-10 shadow-2xl">
        <header class="text-center mb-10"><h1 class="text-xl font-extralight uppercase tracking-widest">Design Agent</h1></header>
        <div class="space-y-8">
            <div class="group"><p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 mb-1">Značka</p><input type="text" id="compName" value="ELYSSIA" class="input-minimal uppercase"></div>
            <div class="group"><p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 mb-1">Popis pro AI</p><textarea id="compDesc" rows="2" class="input-minimal text-sm" placeholder="e.g. Pure water ripples..."></textarea></div>
            <div class="group"><p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 mb-1">QR Odkaz</p><input type="text" id="qrLink" value="https://www.elyssia.cz" class="input-minimal text-xs"></div>
            <div class="relative py-4 border border-dashed border-white/20 text-center rounded-xl">
                <input type="file" id="logoInput" accept="image/png" class="absolute inset-0 opacity-0">
                <p id="uploadText" class="text-[10px] text-slate-400">LOGO (PNG)</p>
                <div id="logoStore" data-blob="" class="hidden"></div>
            </div>
            <button onclick="runDesigner()" id="genBtn" class="bg-white text-black w-full py-4 rounded-full uppercase text-[10px] tracking-widest">Generovat</button>
            <div id="loader" class="hidden mt-6 text-center"><p id="status" class="text-[9px] animate-pulse uppercase tracking-wider">Zpracovávám...</p></div>
        </div>
    </div>
    <div id="qr-hidden" class="hidden"></div>

    <script>
        const { jsPDF } = window.jspdf;

        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas'); canvas.width = 400; canvas.height = 400;
                    const ctx = canvas.getContext('2d');
                    const s = Math.min(380/img.width, 380/img.height);
                    ctx.drawImage(img, (400-img.width*s)/2, (400-img.height*s)/2, img.width*s, img.height*s);
                    document.getElementById('logoStore').setAttribute('data-blob', canvas.toDataURL('image/png'));
                    document.getElementById('uploadText').innerText = "Logo Připraveno ✓";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        async function runDesigner() {
            const name = document.getElementById('compName').value;
            const desc = document.getElementById('compDesc').value;
            const qrUrl = document.getElementById('qrLink').value;
            const logoData = document.getElementById('logoStore').getAttribute('data-blob');

            document.getElementById('genBtn').disabled = true;
            document.getElementById('loader').classList.remove('hidden');

            try {
                const resFetch = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ description: desc }) });
                const resData = await resFetch.json();

                const qrDiv = document.getElementById('qr-hidden'); qrDiv.innerHTML = "";
                new QRCode(qrDiv, { text: qrUrl, width: 300, height: 300 });
                await new Promise(r => setTimeout(r, 500));
                const qrImg = qrDiv.querySelector('canvas').toDataURL("image/png");

                const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [200, 50] });

                doc.addImage(resData.imageUrl, 'JPEG', 0, 0, 140, 50);
                doc.setFillColor(255, 255, 255); doc.rect(140, 0, 60, 50, 'F');
                doc.setDrawColor(240, 240, 240); doc.line(140, 0, 140, 50);

                // Značka a QR/Logo v grafice
                doc.setTextColor(255); doc.setFontSize(22); doc.text(name.toUpperCase(), 15, 25, { charSpace: 6 });
                doc.setFillColor(255, 255, 255); doc.roundedRect(117, 27, 18, 18, 2, 2, 'F');
                doc.addImage(qrImg, 'PNG', 118, 28, 16, 16);
                if (logoData) { doc.roundedRect(117, 5, 18, 18, 2, 2, 'F'); doc.addImage(logoData, 'PNG', 118, 6, 16, 16); }

                // --- PRÁVNÍ SEKCE (DYNAMICKÉ ŘÁDKOVÁNÍ A STRUKTURA) ---
                doc.setTextColor(0); doc.setFontSize(4.5); doc.setFont("helvetica", "bold");
                doc.text("Neperlivá pramenitá voda", 143, 6);
                doc.text("Chemické složení (mg/l):", 176, 6);

                let currentY = 8.5;
                const colW = 26; // MAXIMÁLNÍ DOVOLENÁ ŠÍŘKA TEXTU V MM

                // Pomocná funkce pro bezpečné vykreslení a spočítání výšky
                function drawWrappedText(text, isBold = false) {
                    doc.setFont("helvetica", isBold ? "bold" : "normal");
                    doc.setFontSize(isBold ? 3.8 : 3.6);

                    // Vykreslení s natvrdo nastaveným maxWidth parametrem
                    doc.text(text, 143, currentY, { maxWidth: colW });

                    // Spočítání reálné výšky, kterou text zabral v PDF
                    const dim = doc.getTextDimensions(text, { maxWidth: colW });
                    currentY += dim.h + 1.2; // Přičteme výšku odstavce + malou mezeru
                }

                const p1 = "Přírodní pramenitá voda ze srdce Štýrska (Steiermark). Nedotčená příroda, filtrace přes vápencové horniny Alp a trvalé kontroly zaručují špičkovou kvalitu.";
                drawWrappedText(p1, false);

                drawWrappedText("Složení: Neperlivá pramenitá voda", true);

                const p3 = "Minimální trvanlivost: Viz potisk na lahvi.\nSkladování: Chraňte před teplem a sluncem.\nNázev pramene: Seisensteinquelle, Rakousko";
                drawWrappedText(p3, false);

                drawWrappedText("Vyrobeno a plněno / země původu:", true);
                currentY -= 0.5; // Jemná korekce rozestupu
                drawWrappedText("Wildalpen Wasserverwertungs GmbH\nSäusenbach 166, A-8924 Wildalpen, Rakousko", false);

                drawWrappedText("Distributor:", true);
                currentY -= 0.5;
                drawWrappedText("ELYSSIA s.r.o., Zenklova 24/54\n180 00 Praha 8, ČR\nwww.elyssia.cz", false);

                // Objem a PET symbol (Fixní pozice zcela dole)
                doc.setFontSize(10); doc.setFont("helvetica", "bold"); doc.text("0,33 l", 143, 46);
                doc.setDrawColor(0); doc.line(157, 45, 160, 40); doc.line(160, 40, 163, 45); doc.line(163, 45, 157, 45);
                doc.setFontSize(3.5); doc.text("01", 158.8, 44); doc.text("PET", 158.2, 47.5);

                // --- TABULKA SLOŽENÍ (POSUNUTÁ DOPRAVA PRO VĚTŠÍ BEZPEČÍ) ---
                const tY = 8;
                const tD = [
                    ["pH hodnota", "7,99"], ["Kyslík (O2)", "9,2"], ["Sodík (Na+)", "2,0"],
                    ["Vápník (Ca2+)", "45"], ["Hořčík (Mg2+)", "13"], ["Hydrogenuhličitany", "170"],
                    ["Draslík (K+)", "0,4"], ["Chloridy (Cl-)", "2,6"], ["Dusitany (NO2-)", "0,01"],
                    ["Sírany (SO4 2-)", "11"], ["Fluoridy (F-)", "0,1"]
                ];

                doc.setFontSize(3.8);
                for(let j=0; j<tD.length; j++) {
                    let ty = tY + j*3.2;
                    doc.text(tD[j][0], 177, ty + 2.2);
                    doc.text(tD[j][1], 192, ty + 2.2);
                    doc.line(176, ty, 198, ty); // Vodorovné linky
                }
                // Obrysové svislé linky tabulky
                doc.line(176, tY+tD.length*3.2, 198, tY+tD.length*3.2);
                doc.line(176, tY, 176, tY+tD.length*3.2);
                doc.line(191, tY, 191, tY+tD.length*3.2);
                doc.line(198, tY, 198, tY+tD.length*3.2);

                doc.save(`${name.toUpperCase()}_Label.pdf`);
            } catch (err) { alert(err.message); } finally { document.getElementById('genBtn').disabled = false; document.getElementById('loader').classList.add('hidden'); }
        }
    </script>
</body>
</html>
