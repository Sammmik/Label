<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Label Studio - Bulletproof Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; }
        .minimal-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; }
        .input-minimal { background: transparent; border-bottom: 1px solid rgba(255,255,255,0.2); width: 100%; outline: none; color: #fff; padding: 0.5rem 0; }
    </style>
</head>
<body class="min-h-screen p-6 flex items-center justify-center">

    <div class="max-w-md w-full minimal-card p-10 shadow-2xl">
        <header class="text-center mb-10"><h1 class="text-xl font-extralight uppercase tracking-widest">Design Agent</h1></header>
        <div class="space-y-8">
            <div class="group"><p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 mb-1">Značka</p><input type="text" id="compName" value="ELYSSIA" class="input-minimal uppercase"></div>
            <div class="group"><p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 mb-1">Popis pro AI</p><textarea id="compDesc" rows="2" class="input-minimal text-sm" placeholder="e.g. Premium mountain water ripples..."></textarea></div>
            <div class="group"><p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 mb-1">QR Odkaz</p><input type="text" id="qrLink" value="https://www.elyssia.cz" class="input-minimal text-xs"></div>
            <div class="relative py-4 border border-dashed border-white/20 text-center rounded-xl">
                <input type="file" id="logoInput" accept="image/png" class="absolute inset-0 opacity-0 cursor-pointer">
                <p id="uploadText" class="text-[10px] text-slate-400">Připojit LOGO (PNG)</p>
                <div id="logoStore" data-blob="" class="hidden"></div>
            </div>
            <button onclick="runDesigner()" id="genBtn" class="bg-white text-black w-full py-4 rounded-full uppercase text-[10px] tracking-widest transition active:scale-95">Generovat Kolekci</button>
            <div id="loader" class="hidden mt-6 text-center"><p id="status" class="text-[9px] animate-pulse uppercase tracking-wider">Zpracovávám...</p></div>
        </div>
    </div>

    <div id="qr-hidden" class="hidden" style="display:none;"></div>

    <script>
        const { jsPDF } = window.jspdf;

        // Načtení uživatelského loga
        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas'); canvas.width = 400; canvas.height = 400;
                    const ctx = canvas.getContext('2d');
                    const s = Math.min(380/img.width, 380/img.height);
                    ctx.drawImage(img, (400-img.width*s)/2, (400-img.height*s)/2, img.width*s, img.height*s);
                    document.getElementById('logoStore').setAttribute('data-blob', canvas.toDataURL('image/png'));
                    document.getElementById('uploadText').innerText = "Logo Připraveno ✓";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // BEZPEČNÁ FUNKCE PRO NAČTENÍ FONTU
        async function loadFont(url) {
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error("Nelze stáhnout font.");
                const blob = await res.blob();
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(blob);
                });
            } catch (err) {
                console.warn("Upozornění: Stahování fontu selhalo. Použije se záložní font.", err);
                return null;
            }
        }

        // Výpočet jasu s ochranou proti zaseknutí
        function getAverageBrightness(base64Src) {
            return new Promise((resolve) => {
                if (!base64Src) return resolve('light');
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
                    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                    let sum = 0; for(let x = 0; x < data.length; x+=4) sum += Math.floor((data[x] * 299 + data[x+1] * 587 + data[x+2] * 114) / 1000);
                    resolve((sum / (img.width * img.height)) > 127 ? 'light' : 'dark');
                };
                img.onerror = () => resolve('light');
                img.src = base64Src;
            });
        }

        async function runDesigner() {
            const name = document.getElementById('compName').value;
            const desc = document.getElementById('compDesc').value;
            const qrUrl = document.getElementById('qrLink').value || "https://www.elyssia.cz";
            const logoData = document.getElementById('logoStore').getAttribute('data-blob');
            const statusLabel = document.getElementById('status');

            document.getElementById('genBtn').disabled = true;
            document.getElementById('loader').classList.remove('hidden');

            try {
                // A) Generování AI grafiky a výpočet jasu
                const results = [];
                for (let i = 0; i < 3; i++) {
                    statusLabel.innerText = `Spojení s AI ${i+1}/3...`;
                    const resFetch = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ description: desc }) });
                    const resData = await resFetch.json();

                    if (!resFetch.ok) throw new Error(resData.error || "Chyba API");

                    statusLabel.innerText = `Analyzuji kontrast ${i+1}...`;
                    resData.tone = await getAverageBrightness(resData.imageUrl);
                    results.push(resData);
                }

                // B) Extrémně bezpečný QR kód (standardní kresba v DOMu)
                statusLabel.innerText = "Sestavuji grafické prvky...";
                const qrDiv = document.getElementById('qr-hidden');
                qrDiv.innerHTML = "";
                new QRCode(qrDiv, { text: qrUrl, width: 300, height: 300, colorDark: "#000000", colorLight: "#ffffff" });
                await new Promise(r => setTimeout(r, 500));
                const qrImg = qrDiv.querySelector('canvas').toDataURL("image/png");

                // C) Dynamické načtení českého fontu (S Fallbackem na základní Helvetica)
                statusLabel.innerText = "Stahuji typografii...";
                const fontRegular = await loadFont('https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.66/fonts/Roboto/Roboto-Regular.ttf');
                const fontBold = await loadFont('https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.66/fonts/Roboto/Roboto-Medium.ttf');

                statusLabel.innerText = "Kreslím finální PDF...";
                const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [200, 50] });

                let fontName = "helvetica"; // Záložní font
                if (fontRegular && fontBold) {
                    doc.addFileToVFS("Roboto-Regular.ttf", fontRegular);
                    doc.addFont("Roboto-Regular.ttf", "Roboto", "normal");
                    doc.addFileToVFS("Roboto-Bold.ttf", fontBold);
                    doc.addFont("Roboto-Bold.ttf", "Roboto", "bold");
                    fontName = "Roboto"; // Úspěšně načteno
                }

                results.forEach((res, i) => {
                    if (i > 0) doc.addPage([200, 50], 'l');

                    // Pozadí a zóna
                    doc.addImage(res.imageUrl, 'JPEG', 0, 0, 140, 50);
                    doc.setFillColor(255, 255, 255); doc.rect(140, 0, 60, 50, 'F');
                    doc.setDrawColor(240, 240, 240); doc.line(140, 0, 140, 50);

                    // Název značky
                    doc.setTextColor(res.tone === 'light' ? 30 : 255);
                    doc.setFontSize(name.length > 10 ? 16 : 22);
                    doc.setFont("helvetica", "normal");
                    doc.text(name.toUpperCase(), 15, 25, { charSpace: 6 });

                    // Transparentní podklad pro QR a Logo (Luxusní vizuál)
                    if (logoData) {
                        doc.addImage(logoData, 'PNG', 118, 6, 16, 16);
                    }
                    doc.saveGraphicsState();
                    doc.setGState(new doc.GState({ opacity: 0.85 }));
                    doc.setFillColor(255, 255, 255); doc.roundedRect(117, 27, 18, 18, 2, 2, 'F');
                    doc.restoreGraphicsState();
                    doc.addImage(qrImg, 'PNG', 118, 28, 16, 16);

                    // --- PRÁVNÍ TEXTY (NEPŘEKROČITELNÁ HRANICE) ---
                    doc.setTextColor(0);
                    doc.setFontSize(4.2); doc.setFont(fontName, "bold");
                    doc.text("Neperlivá pramenitá voda", 142, 6);

                    let currentY = 8.5;
                    const colW = 27; // Tvrdé zalamování
                    const leftX = 142;

                    function printText(text, isBold = false) {
                        doc.setFont(fontName, isBold ? "bold" : "normal");
                        doc.setFontSize(isBold ? 3.8 : 3.5);
                        const lines = doc.splitTextToSize(text, colW);
                        doc.text(lines, leftX, currentY);
                        currentY += (lines.length * 1.4) + (isBold ? 0.6 : 1.5);
                    }

                    printText("Přírodní pramenitá voda ze srdce Štýrska (Steiermark). Nedotčená příroda, filtrace přes vápencové horniny Alp a trvalé kontroly zaručují špičkovou kvalitu.", false);
                    printText("Složení: Neperlivá pramenitá voda", true);
                    printText("Minimální trvanlivost: Viz potisk na lahvi.\nSkladování: Chraňte před teplem a sluncem.\nNázev pramene: Seisensteinquelle, Rakousko", false);
                    printText("Vyrobeno a plněno / země původu:", true);
                    printText("Wildalpen Wasserverwertungs GmbH\nSäusenbach 166, A-8924 Wildalpen, Rakousko", false);
                    printText("Distributor:", true);
                    printText("ELYSSIA s.r.o., Zenklova 24/54\n180 00 Praha 8, ČR\nwww.elyssia.cz", false);

                    // Objem a PET symbol dole
                    doc.setFont(fontName, "bold");
                    doc.setFontSize(10); doc.text("0,33 l", leftX, 47);
                    doc.setDrawColor(0); doc.line(158, 46, 161, 41); doc.line(161, 41, 164, 46); doc.line(164, 46, 158, 46);
                    doc.setFontSize(3.5); doc.text("01", 159.8, 45); doc.text("PET", 159.2, 48.5);

                    // --- TABULKA SLOŽENÍ NA 172mm ---
                    const tX = 172;
                    const tY = 8;
                    const tD = [
                        ["pH hodnota", "7,99"], ["Kyslík (O2)", "9,2"], ["Sodík (Na+)", "2,0"],
                        ["Vápník (Ca2+)", "45"], ["Hořčík (Mg2+)", "13"], ["Hydrogenuhličitany", "170"],
                        ["Draslík (K+)", "0,4"], ["Chloridy (Cl-)", "2,6"], ["Dusitany (NO2-)", "0,01"],
                        ["Sírany (SO4 2-)", "11"], ["Fluoridy (F-)", "0,1"]
                    ];

                    doc.setFont(fontName, "bold");
                    doc.setFontSize(4); doc.text("Chemické složení (mg/l):", tX, 6);
                    doc.setFont(fontName, "normal");
                    doc.setFontSize(3.8);

                    for(let j=0; j<tD.length; j++) {
                        let ty = tY + j*3.2;
                        doc.text(tD[j][0], tX + 1, ty + 2.2);
                        doc.text(tD[j][1], tX + 17, ty + 2.2);
                        doc.line(tX, ty, 198, ty);
                    }
                    doc.line(tX, tY+tD.length*3.2, 198, tY+tD.length*3.2);
                    doc.line(tX, tY, tX, tY+tD.length*3.2);
                    doc.line(tX + 16, tY, tX + 16, tY+tD.length*3.2);
                    doc.line(198, tY, 198, tY+tD.length*3.2);
                });

                doc.save(`${name.toUpperCase()}_Labels.pdf`);

            } catch (err) {
                console.error(err);
                alert(`Chyba při generování: ${err.message}`);
            } finally {
                document.getElementById('genBtn').disabled = false;
                document.getElementById('loader').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
