<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Label Studio - Produkční verze</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;400&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; -webkit-font-smoothing: antialiased; }
        .minimal-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); border-radius: 2rem; }
        .input-minimal { background: transparent; border-bottom: 1px solid rgba(255,255,255,0.2); padding: 0.75rem 0; width: 100%; outline: none; transition: 0.4s; color: #fff; font-weight: 200; }
        .input-minimal:focus { border-bottom-color: #fff; }
        #bar { transition: width 0.4s ease; }
    </style>
</head>
<body class="min-h-screen p-6 flex items-center justify-center">

    <div class="max-w-md w-full minimal-card p-10 shadow-2xl relative overflow-hidden">
        <header class="text-center mb-10">
            <h1 class="text-xl font-extralight tracking-[0.5em] uppercase">Design <span class="font-normal text-slate-400 italic">Agent</span></h1>
        </header>

        <div class="space-y-8">
            <div class="group"><p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 mb-1">Značka</p><input type="text" id="compName" value="ELYSSIA" class="input-minimal uppercase tracking-[0.2em]"></div>
            <div class="group"><p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 mb-1">Popis pro AI</p><textarea id="compDesc" rows="2" class="input-minimal text-sm" placeholder="e.g. Pure water ripples..."></textarea></div>
            <div class="group"><p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 mb-1">QR Odkaz</p><input type="text" id="qrLink" value="https://www.elyssia.cz" class="input-minimal text-xs font-light"></div>

            <div class="relative py-4 border border-dashed border-white/20 text-center cursor-pointer rounded-xl">
                <input type="file" id="logoInput" accept="image/png" class="absolute inset-0 opacity-0 cursor-pointer">
                <p id="uploadText" class="text-[10px] uppercase tracking-[0.2em] font-light text-slate-400">Připojit Logo (PNG)</p>
                <div id="logoStore" data-blob="" class="hidden"></div>
            </div>

            <button onclick="runDesigner()" id="genBtn" class="bg-white text-black w-full py-4 rounded-full uppercase tracking-widest text-[10px]">Generovat Kolekci</button>
            <div id="loader" class="hidden mt-6 text-center"><div class="w-full bg-white/10 h-[2px] mb-3 rounded-full overflow-hidden"><div id="bar" class="bg-white h-[2px] w-0"></div></div><p id="status" class="text-[9px] uppercase tracking-[0.3em] animate-pulse">Navazuji spojení...</p></div>
        </div>
    </div>

    <div id="qr-hidden" class="hidden"></div>

    <script>
        const { jsPDF } = window.jspdf;

        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas'); canvas.width = 400; canvas.height = 400;
                    const ctx = canvas.getContext('2d');
                    const s = Math.min(380/img.width, 380/img.height);
                    ctx.drawImage(img, (400-img.width*s)/2, (400-img.height*s)/2, img.width*s, img.height*s);
                    document.getElementById('logoStore').setAttribute('data-blob', canvas.toDataURL('image/png'));
                    document.getElementById('uploadText').innerText = "Logo Připraveno ✓";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        async function fetchDesign(desc) {
            const res = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ description: desc }) });
            return await res.json();
        }

        function getAverageBrightness(base64Src) {
            return new Promise((resolve) => {
                const img = new Image(); img.onload = () => {
                    const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
                    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                    let sum = 0; for(let x = 0; x < data.length; x+=4) sum += Math.floor((data[x] * 299 + data[x+1] * 587 + data[x+2] * 114) / 1000);
                    resolve((sum / (img.width * img.height)) > 127 ? 'light' : 'dark');
                }; img.src = base64Src;
            });
        }

        async function runDesigner() {
            const name = document.getElementById('compName').value;
            const desc = document.getElementById('compDesc').value;
            const qrUrl = document.getElementById('qrLink').value;
            const logoData = document.getElementById('logoStore').getAttribute('data-blob');
            const statusLabel = document.getElementById('status');
            const bar = document.getElementById('bar');

            document.getElementById('genBtn').disabled = true;
            document.getElementById('loader').classList.remove('hidden');

            try {
                const results = [];
                for (let i = 0; i < 3; i++) {
                    statusLabel.innerText = `Generování ${i+1}/3...`;
                    const res = await fetchDesign(desc);
                    res.tone = await getAverageBrightness(res.imageUrl);
                    results.push(res);
                    bar.style.width = `${(i+1)*33}%`;
                }

                const qrDiv = document.getElementById('qr-hidden'); qrDiv.innerHTML = "";
                new QRCode(qrDiv, { text: qrUrl, width: 300, height: 300 });
                await new Promise(r => setTimeout(r, 500));
                const qrImg = qrDiv.querySelector('canvas').toDataURL("image/png");

                const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [200, 50] });

                results.forEach((res, i) => {
                    if (i > 0) doc.addPage([200, 50], 'l');
                    doc.addImage(res.imageUrl, 'JPEG', 0, 0, 140, 50);
                    doc.setFillColor(255, 255, 255); doc.rect(140, 0, 60, 50, 'F');
                    doc.setDrawColor(240, 240, 240); doc.line(140, 0, 140, 50);

                    // Název značky
                    doc.setTextColor(res.tone === 'light' ? 30 : 255);
                    doc.setFontSize(name.length > 10 ? 16 : 22);
                    doc.text(name.toUpperCase(), 15, 25, { charSpace: 6 });

                    // QR a Logo v grafice
                    doc.setFillColor(255, 255, 255); doc.roundedRect(117, 27, 18, 18, 2, 2, 'F');
                    doc.addImage(qrImg, 'PNG', 118, 28, 16, 16);
                    if (logoData) { doc.roundedRect(117, 5, 18, 18, 2, 2, 'F'); doc.addImage(logoData, 'PNG', 118, 6, 16, 16); }

                    // --- PRÁVNÍ TEXTY (DYNAMICKÉ ŘÁDKOVÁNÍ) ---
                    doc.setTextColor(0); doc.setFont("helvetica", "bold"); doc.setFontSize(4.5);
                    doc.text("Neperlivá pramenitá voda", 143, 6);

                    let currentY = 8.5;
                    const colW = 31;
                    const p1 = "Přírodní pramenitá voda ze srdce Štýrska (Steiermark). Nedotčená příroda, filtrace přes vápencové horniny Alp a trvalé přísné kontroly zaručují neustále špičkovou kvalitu.";
                    const p3 = "Minimální trvanlivost: Viz potisk na lahvi.\nSkladování: Chraňte před teplem a přímým slunečním zářením.\nNázev a místo pramene: Seisensteinquelle, Wildalpen, Rakousko";

                    doc.setFont("helvetica", "normal"); doc.setFontSize(4);
                    const l1 = doc.splitTextToSize(p1, colW); doc.text(l1, 143, currentY);
                    currentY += (l1.length * 2) + 1.5;

                    doc.setFont("helvetica", "bold"); doc.text("Složení: Neperlivá pramenitá voda", 143, currentY);
                    currentY += 2.5;

                    doc.setFont("helvetica", "normal");
                    const l3 = doc.splitTextToSize(p3, colW); doc.text(l3, 143, currentY);
                    currentY += (l3.length * 2) + 2.5;

                    doc.setFont("helvetica", "bold"); doc.text("Vyrobeno a plněno / země původu:", 143, currentY);
                    currentY += 2;
                    doc.setFont("helvetica", "normal"); doc.text("Wildalpen Wasserverwertungs GmbH\nSäusenbach 166, A-8924 Wildalpen, Rakousko", 143, currentY);
                    currentY += 5;

                    doc.setFont("helvetica", "bold"); doc.text("Distributor:", 143, currentY);
                    currentY += 2;
                    doc.setFont("helvetica", "normal"); doc.text("ELYSSIA s.r.o.\nZenklova 24/54, 180 00 Praha 8, ČR\nwww.elyssia.cz", 143, currentY);

                    // Objem a PET
                    doc.setFontSize(10); doc.setFont("helvetica", "bold"); doc.text("0,33 l", 143, 46);
                    doc.setDrawColor(0); doc.line(160, 45, 163, 40); doc.line(163, 40, 166, 45); doc.line(166, 45, 160, 45);
                    doc.setFontSize(3.5); doc.text("01", 161.8, 44); doc.text("PET", 161.2, 47.5);

                    // TABULKA
                    const tY = 8; const tD = [["pH hodnota", "7,99"], ["Kyslík (O2)", "9,2"], ["Sodík (Na+)", "2,0"], ["Vápník (Ca2+)", "45"], ["Hořčík (Mg2+)", "13"], ["Hydrogenuhličitany", "170"], ["Draslík (K+)", "0,4"], ["Chloridy (Cl-)", "2,6"], ["Dusitany (NO2-)", "0,01"], ["Sírany (SO4 2-)", "11"], ["Fluoridy (F-)", "0,1"]];
                    doc.setFontSize(4); doc.text("Chemické složení (mg/l):", 175, 6);
                    for(let j=0; j<tD.length; j++) {
                        let y = tY + j*3.2; doc.text(tD[j][0], 176, y + 2.2); doc.text(tD[j][1], 191, y + 2.2);
                        doc.line(175, y, 198, y);
                    }
                    doc.line(175, tY+tD.length*3.2, 198, tY+tD.length*3.2); doc.line(175, tY, 175, tY+tD.length*3.2); doc.line(190, tY, 190, tY+tD.length*3.2); doc.line(198, tY, 198, tY+tD.length*3.2);
                });

                doc.save(`${name.toUpperCase()}_Labels.pdf`);
            } catch (err) { alert(err.message); } finally { document.getElementById('genBtn').disabled = false; document.getElementById('loader').classList.add('hidden'); }
        }
    </script>
</body>
</html>
