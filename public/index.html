<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Label Studio - The Masterpiece</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; }
        .minimal-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; }
        .input-minimal { background: transparent; border-bottom: 1px solid rgba(255,255,255,0.2); width: 100%; outline: none; color: #fff; padding: 0.5rem 0; }
    </style>
</head>
<body class="min-h-screen p-6 flex items-center justify-center">

    <div class="max-w-md w-full minimal-card p-10 shadow-2xl">
        <header class="text-center mb-10"><h1 class="text-xl font-extralight uppercase tracking-widest">Design Agent</h1></header>
        <div class="space-y-8">
            <div class="group"><p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 mb-1">Značka</p><input type="text" id="compName" value="ELYSSIA" class="input-minimal uppercase"></div>
            <div class="group"><p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 mb-1">Popis pro AI</p><textarea id="compDesc" rows="2" class="input-minimal text-sm" placeholder="e.g. Premium mountain water ripples..."></textarea></div>
            <div class="group"><p class="text-[9px] uppercase tracking-[0.3em] text-slate-500 mb-1">QR Odkaz</p><input type="text" id="qrLink" value="https://www.elyssia.cz" class="input-minimal text-xs"></div>
            <div class="relative py-4 border border-dashed border-white/20 text-center rounded-xl">
                <input type="file" id="logoInput" accept="image/png" class="absolute inset-0 opacity-0 cursor-pointer">
                <p id="uploadText" class="text-[10px] text-slate-400">Připojit LOGO (PNG)</p>
                <div id="logoStore" data-blob="" class="hidden"></div>
            </div>
            <button onclick="runDesigner()" id="genBtn" class="bg-white text-black w-full py-4 rounded-full uppercase text-[10px] tracking-widest transition active:scale-95">Generovat Kolekci</button>
            <div id="loader" class="hidden mt-6 text-center"><p id="status" class="text-[9px] animate-pulse uppercase tracking-wider">Zpracovávám...</p></div>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;

        // Načtení uživatelského loga
        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas'); canvas.width = 400; canvas.height = 400;
                    const ctx = canvas.getContext('2d');
                    const s = Math.min(380/img.width, 380/img.height);
                    ctx.drawImage(img, (400-img.width*s)/2, (400-img.height*s)/2, img.width*s, img.height*s);
                    document.getElementById('logoStore').setAttribute('data-blob', canvas.toDataURL('image/png'));
                    document.getElementById('uploadText').innerText = "Logo Připraveno ✓";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Pomocná funkce pro bezpečné načtení fontů
        async function loadFont(url) {
            const res = await fetch(url);
            const blob = await res.blob();
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(blob);
            });
        }

        // Výpočet jasu s pojistkou proti chybám (aby se to nezaseklo)
        function getAverageBrightness(base64Src) {
            return new Promise((resolve) => {
                if (!base64Src) return resolve('light');
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas'); canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0);
                    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                    let sum = 0; for(let x = 0; x < data.length; x+=4) sum += Math.floor((data[x] * 299 + data[x+1] * 587 + data[x+2] * 114) / 1000);
                    resolve((sum / (img.width * img.height)) > 127 ? 'light' : 'dark');
                };
                img.onerror = () => resolve('light'); // Pojistka
                img.src = base64Src;
            });
        }

        async function runDesigner() {
            const name = document.getElementById('compName').value;
            const desc = document.getElementById('compDesc').value;
            const qrUrl = document.getElementById('qrLink').value;
            const logoData = document.getElementById('logoStore').getAttribute('data-blob');
            const statusLabel = document.getElementById('status');

            document.getElementById('genBtn').disabled = true;
            document.getElementById('loader').classList.remove('hidden');

            try {
                // A) Generování AI grafiky s kontrolou chyb
                const results = [];
                for (let i = 0; i < 3; i++) {
                    statusLabel.innerText = `Generování ${i+1}/3...`;
                    const resFetch = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ description: desc }) });

                    const resData = await resFetch.json();
                    if (!resFetch.ok) throw new Error(resData.error || "Chyba při komunikaci s AI");

                    statusLabel.innerText = `Analyzuji barvy ${i+1}...`;
                    resData.tone = await getAverageBrightness(resData.imageUrl);
                    results.push(resData);
                }

                // B) Generování průhledných QR kódů
                statusLabel.innerText = "Sestavuji grafické prvky...";
                const qrDivBlack = document.createElement('div');
                new QRCode(qrDivBlack, { text: qrUrl, width: 300, height: 300, colorDark: "#000000", colorLight: "transparent" });
                const qrDivWhite = document.createElement('div');
                new QRCode(qrDivWhite, { text: qrUrl, width: 300, height: 300, colorDark: "#ffffff", colorLight: "transparent" });

                await new Promise(r => setTimeout(r, 500));
                const qrImgBlack = qrDivBlack.querySelector('canvas').toDataURL("image/png");
                const qrImgWhite = qrDivWhite.querySelector('canvas').toDataURL("image/png");

                // C) Načtení českého fontu Roboto
                statusLabel.innerText = "Stahuji českou typografii...";
                const fontRegular = await loadFont('https://cdn.jsdelivr.net/npm/@canvas-fonts/roboto@1.0.4/Roboto-Regular.ttf');
                const fontBold = await loadFont('https://cdn.jsdelivr.net/npm/@canvas-fonts/roboto@1.0.4/Roboto-Bold.ttf');

                // D) Vytvoření PDF
                statusLabel.innerText = "Vykresluji PDF...";
                const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: [200, 50] });

                doc.addFileToVFS("Roboto-Regular.ttf", fontRegular);
                doc.addFont("Roboto-Regular.ttf", "Roboto", "normal");
                doc.addFileToVFS("Roboto-Bold.ttf", fontBold);
                doc.addFont("Roboto-Bold.ttf", "Roboto", "bold");

                results.forEach((res, i) => {
                    if (i > 0) doc.addPage([200, 50], 'l');

                    // AI Pozadí a informační zóna

                    doc.setFillColor(255, 255, 255); doc.rect(140, 0, 60, 50, 'F');
                    doc.setDrawColor(24
