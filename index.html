<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Label Turbo PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-[#050505] text-white min-h-screen p-4 flex items-center justify-center">

    <div class="max-w-md w-full bg-[#111] p-8 rounded-[2.5rem] shadow-2xl border border-white/10">
        <h1 class="text-2xl font-black text-center mb-6 bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent uppercase italic">Turbo Designer</h1>

        <div class="space-y-4">
            <input type="text" id="compName" value="SETOS spol., s.r.o." class="w-full bg-white/5 p-4 rounded-2xl border-none text-white font-bold outline-none ring-1 ring-white/10 focus:ring-blue-500 transition-all">
            <input type="text" id="compDesc" value="Prodej elektroniky a technologií" class="w-full bg-white/5 p-4 rounded-2xl border-none text-slate-300">
            <input type="text" id="qrLink" value="https://www.setos.cz" class="w-full bg-white/5 p-4 rounded-2xl border-none text-blue-400">
            
            <div class="bg-white/5 p-4 rounded-2xl border-2 border-dashed border-white/10 text-center">
                <input type="file" id="logoInput" accept="image/*" class="text-xs text-slate-500 cursor-pointer">
            </div>

            <button onclick="generateTurbo()" id="genBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-3xl font-black text-xl text-white shadow-xl active:scale-95 transition-all uppercase">
                Vytvořit hned
            </button>
            
            <p id="status" class="hidden text-center text-cyan-400 animate-pulse text-[10px] font-bold mt-4 uppercase">Generuji...</p>
        </div>
        <div id="qr-cache" class="hidden"></div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;

        // Okamžité zpracování loga s limitem na velikost (optimalizace rychlosti)
        async function processLogo(file) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                const reader = new FileReader();
                reader.onload = (e) => img.src = e.target.result;
                reader.onerror = reject;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const size = 300; // Sníženo pro rychlost
                    canvas.width = size; canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0,0,size,size);
                    const s = Math.min(size/img.width, size/img.height);
                    ctx.drawImage(img, (size-img.width*s)/2, (size-img.height*s)/2, img.width*s, img.height*s);
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                };
                reader.readAsDataURL(file);
            });
        }

        async function generateTurbo() {
            const btn = document.getElementById('genBtn');
            const name = document.getElementById('compName').value;
            const desc = document.getElementById('compDesc').value;
            const qrUrl = document.getElementById('qrLink').value;
            const logoFile = document.getElementById('logoInput').files[0];

            btn.disabled = true;
            document.getElementById('status').classList.remove('hidden');

            try {
                // 1. QR generování (vytvoříme Canvas přímo v paměti)
                const qrDiv = document.getElementById('qr-cache');
                qrDiv.innerHTML = "";
                new QRCode(qrDiv, { text: qrUrl, width: 200, height: 200 });
                
                // Krátké čekání jen pro jistotu vykreslení QR (0.3s)
                await new Promise(r => setTimeout(r, 300));
                const qrImg = qrDiv.querySelector('canvas').toDataURL("image/png");

                // 2. Logo (pokud je, zpracuje se bleskově)
                let logoData = logoFile ? await processLogo(logoFile) : null;

                // 3. Tvorba PDF
                const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: [200, 50] });

                for (let i = 0; i < 3; i++) {
                    if (i > 0) doc.addPage([200, 50], 'l');

                    // DESIGNY (rychlé tvary)
                    const colors = [[10,15,30], [255,255,255], [20,20,20]];
                    doc.setFillColor(...colors[i]);
                    doc.rect(0, 0, 200, 50, 'F');

                    if(i === 0) { // Tech pattern
                        doc.setDrawColor(0, 180, 255);
                        for(let x=0; x<160; x+=15) doc.line(x, 0, x+10, 50);
                    }

                    doc.setTextColor(i === 1 ? 0 : 255);
                    doc.setFontSize(22); doc.text(name.toUpperCase(), 15, 22);
                    doc.setFontSize(10); doc.text(desc, 15, 30);

                    if (logoData) {
                        doc.setFillColor(255, 255, 255); doc.roundedRect(125, 10, 30, 30, 2, 2, 'F');
                        doc.addImage(logoData, 'JPEG', 127, 12, 26, 26);
                    }

                    // Pravá bílá zóna
                    doc.setFillColor(255, 255, 255); doc.rect(162, 0, 38, 50, 'F');
                    doc.addImage(qrImg, 'PNG', 172, 32, 15, 15);
                    doc.setDrawColor(200); doc.line(162, 0, 162, 50);
                }

                doc.save(`Etikety_Turbo.pdf`);

            } catch (err) {
                alert("Chyba: " + err);
            } finally {
                btn.disabled = false;
                document.getElementById('status').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
