<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Studio: Intelligence Engine v7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=JetBrains+Mono&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020205; color: #fff; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; }
        .input-ai { background: transparent; border: none; outline: none; width: 100%; color: #3b82f6; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div class="max-w-md w-full space-y-4 pt-4">
        <header class="text-center">
            <h1 class="text-3xl font-black tracking-tighter italic">ENGINE <span class="text-blue-500">PRO</span></h1>
            <p class="text-[9px] uppercase tracking-[0.3em] text-gray-500 font-bold italic">AI Analysis & Generation</p>
        </header>

        <div class="glass p-5 space-y-4">
            <div>
                <label class="text-[9px] uppercase font-black text-gray-500 mb-1 block italic">Webová stránka společnosti</label>
                <input type="text" id="compWeb" value="www.setos.cz" class="input-ai" placeholder="https://...">
            </div>

            <div>
                <label class="text-[9px] uppercase font-black text-gray-500 mb-1 block italic">Analýza činnosti (Popis)</label>
                <textarea id="compDesc" rows="2" class="input-ai" placeholder="Čím se firma zabývá?">Distribuce prémiové elektroniky, technologií a lifestyle doplňků.</textarea>
            </div>

            <div id="logoDrop" class="relative border-2 border-dashed border-gray-800 rounded-xl p-4 text-center transition-all hover:bg-white/5 cursor-pointer">
                <input type="file" id="logoInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-20">
                <div id="previewWrap" class="hidden mb-2 flex justify-center"><img id="logoPreview" src="" class="h-10 w-10 object-contain bg-white rounded shadow-xl"></div>
                <p id="uploadInfo" class="text-[10px] font-bold uppercase text-gray-400 italic">Klikni pro nahrání loga</p>
                <div id="logoStore" data-blob="" class="hidden"></div>
            </div>

            <button onclick="runAiEngine()" id="genBtn" class="w-full bg-blue-600 py-4 rounded-xl font-black text-lg shadow-[0_0_30px_rgba(37,99,235,0.3)] active:scale-95 transition-all uppercase italic">
                Analyzovat & Generovat (3 vzorky)
            </button>
        </div>

        <div id="aiStatus" class="hidden space-y-2 px-2">
            <div class="flex justify-between text-[9px] font-bold uppercase italic"><span id="aiStep">Skenování webu...</span><span id="aiPerc">0%</span></div>
            <div class="w-full bg-gray-900 h-1 rounded-full overflow-hidden"><div id="aiBar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div></div>
        </div>
    </div>

    <div id="qr-hidden" class="hidden"></div>

    <script>
        const { jsPDF } = window.jspdf;

        // Logo Handler
        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 400; canvas.height = 400;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0,0,400,400);
                    const s = Math.min(350/img.width, 350/img.height);
                    ctx.drawImage(img, (400-img.width*s)/2, (400-img.height*s)/2, img.width*s, img.height*s);
                    const data = canvas.toDataURL('image/jpeg', 0.9);
                    document.getElementById('logoStore').setAttribute('data-blob', data);
                    document.getElementById('logoPreview').src = data;
                    document.getElementById('previewWrap').classList.remove('hidden');
                    document.getElementById('uploadInfo').innerText = "LOGO PŘIPRAVENO ✅";
                    document.getElementById('uploadInfo').className = "text-[10px] font-bold text-green-500 uppercase";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        async function runAiEngine() {
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('aiStatus');
            const bar = document.getElementById('aiBar');
            const step = document.getElementById('aiStep');
            const perc = document.getElementById('aiPerc');

            btn.disabled = true;
            status.classList.remove('hidden');

            // AI Analýza - Simulovaný Engine
            const processes = [
                { s: "Připojování k serveru...", p: "20%" },
                { s: "Skenování www struktury...", p: "45%" },
                { s: "Extrakce klíčových slov...", p: "70%" },
                { s: "Generování 3 variant designu...", p: "95%" }
            ];

            for(let proc of processes) {
                step.innerText = proc.s;
                bar.style.width = proc.p;
                perc.innerText = proc.p;
                await new Promise(r => setTimeout(r, 600));
            }

            try {
                // Generování QR z webu
                const web = document.getElementById('compWeb').value;
                const qrDiv = document.getElementById('qr-hidden');
                qrDiv.innerHTML = "";
                new QRCode(qrDiv, { text: web, width: 256, height: 256 });
                await new Promise(r => setTimeout(r, 500));
                const qrImg = qrDiv.querySelector('canvas').toDataURL("image/png");
                const logoData = document.getElementById('logoStore').getAttribute('data-blob');

                const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: [200, 50] });

                // GENERUJEME 3 VZORKY
                for (let i = 0; i < 3; i++) {
                    if (i > 0) doc.addPage([200, 50], 'l');

                    if (i === 0) { // DESIGN 1: INDUSTRIAL CYBER
                        doc.setFillColor(10, 10, 15); doc.rect(0, 0, 200, 50, 'F');
                        doc.setDrawColor(30, 40, 90);
                        for(let x=0; x<160; x+=8) doc.line(x, 0, x+10, 50);
                        doc.setTextColor(255);
                    } else if (i === 1) { // DESIGN 2: MINIMAL TECH
                        doc.setFillColor(250, 250, 255); doc.rect(0, 0, 200, 50, 'F');
                        doc.setDrawColor(230);
                        for(let y=0; y<50; y+=2.5) doc.line(0, y, 162, y);
                        doc.setTextColor(0);
                    } else { // DESIGN 3: NEON ORGANIC
                        doc.setFillColor(15, 15, 20); doc.rect(0, 0, 200, 50, 'F');
                        doc.setDrawColor(0, 200, 255);
                        for(let r=0; r<10; r++) doc.circle(Math.random()*150, Math.random()*50, Math.random()*15);
                        doc.setTextColor(255);
                    }

                    // Branding
                    doc.setFontSize(22); doc.text("SETOS PREMIUM", 15, 22);
                    doc.setFontSize(8); doc.setTextColor(0, 120, 255);
                    doc.text("AI ANALYSIS: ELECTRONICS & TECH", 15, 30);

                    // Logo Insertion
                    if (logoData) {
                        doc.setFillColor(255); doc.roundedRect(125, 10, 30, 30, 2, 2, 'F');
                        doc.addImage(logoData, 'JPEG', 127, 12, 26, 26);
                    }

                    // Tisková bílá zóna
                    doc.setFillColor(255); doc.rect(162, 0, 38, 50, 'F');
                    doc.setDrawColor(220); doc.line(162, 0, 162, 50);
                    doc.addImage(qrImg, 'PNG', 172, 31, 17, 17);
                    doc.setTextColor(100); doc.setFontSize(5);
                    doc.text("AI GENERATED | " + web.toUpperCase(), 168, 5, {angle: -90});
                    doc.text(web.replace('https://',''), 181, 28, {align: 'center'});
                }

                doc.save(`AI_Label_Collection.pdf`);
            } catch (err) { alert(err); } finally {
                btn.disabled = false;
                status.classList.add('hidden');
                bar.style.width = "0%";
            }
        }
    </script>
</body>
</html>
