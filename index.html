<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Designer: Abstract & Type</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;800&family=JetBrains+Mono:wght@400;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: #fff; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; }
        .input-box { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 1rem; width: 100%; outline: none; color: #fff; }
        .btn-ai { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); transition: 0.3s; }
    </style>
</head>
<body class="min-h-screen p-4 flex items-start justify-center">

    <div class="max-w-md w-full glass p-8 shadow-2xl mt-4 relative">
        <header class="text-center mb-8">
            <h1 class="text-2xl font-extrabold tracking-tighter uppercase italic">Designer <span class="text-purple-500">Agent</span></h1>
            <p class="text-[9px] text-gray-500 tracking-[0.5em] font-bold uppercase">Abstract & Typography Engine</p>
        </header>

        <div class="space-y-4">
            <input type="text" id="compName" value="SETOS" class="input-box font-bold uppercase tracking-widest">
            <textarea id="compDesc" rows="2" class="input-box text-sm" placeholder="Vize (např. Temná hlubina, zlatý prach, ledový klid)"></textarea>
            <input type="text" id="qrLink" value="https://www.setos.cz" class="input-box text-xs text-purple-400 font-mono">
            
            <div class="relative bg-white/5 p-4 rounded-xl border border-dashed border-white/20 text-center cursor-pointer hover:bg-white/10 transition">
                <input type="file" id="logoInput" accept="image/png" class="absolute inset-0 opacity-0 cursor-pointer">
                <p id="uploadText" class="text-[10px] uppercase font-bold text-gray-400 italic">Logo (PNG)</p>
                <div id="logoStore" data-blob="" class="hidden"></div>
            </div>

            <button onclick="runDesigner()" id="genBtn" class="btn-ai w-full py-5 rounded-2xl font-black text-lg uppercase italic shadow-xl active:scale-95">
                Vytvořit 3 koncepty
            </button>
            
            <div id="loader" class="hidden mt-6 text-center">
                <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden mb-2">
                    <div id="bar" class="bg-purple-500 h-full w-0 transition-all duration-300"></div>
                </div>
                <p id="status" class="text-[9px] font-bold text-purple-400 uppercase animate-pulse tracking-widest">Generuji umělecké podklady...</p>
            </div>
        </div>
    </div>

    <div id="qr-hidden" class="hidden"></div>

    <script>
        const { jsPDF } = window.jspdf;

        // Logo Handler
        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 400; canvas.height = 400;
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0,0,400,400);
                    const s = Math.min(380/img.width, 380/img.height);
                    ctx.drawImage(img, (400-img.width*s)/2, (400-img.height*s)/2, img.width*s, img.height*s);
                    document.getElementById('logoStore').setAttribute('data-blob', canvas.toDataURL('image/png'));
                    document.getElementById('uploadText').innerText = "LOGO PŘIPRAVENO";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        async function fetchDesign(desc, name) {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ description: desc, companyName: name })
            });
            return await res.json();
        }

        async function runDesigner() {
            const btn = document.getElementById('genBtn');
            const bar = document.getElementById('bar');
            const name = document.getElementById('compName').value;
            const desc = document.getElementById('compDesc').value;
            const qrUrl = document.getElementById('qrLink').value;
            const logoData = document.getElementById('logoStore').getAttribute('data-blob');

            btn.disabled = true;
            document.getElementById('loader').classList.remove('hidden');
            bar.style.width = "10%";

            try {
                // Paralelní generování 3 abstraktů
                const results = await Promise.all([
                    fetchDesign(desc, name),
                    fetchDesign(desc, name),
                    fetchDesign(desc, name)
                ]);

                bar.style.width = "70%";

                // QR kód
                const qrDiv = document.getElementById('qr-hidden');
                qrDiv.innerHTML = "";
                new QRCode(qrDiv, { text: qrUrl, width: 300, height: 300 });
                await new Promise(r => setTimeout(r, 400));
                const qrImg = qrDiv.querySelector('canvas').toDataURL("image/png");

                const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: [200, 50] });

                results.forEach((res, i) => {
                    if (i > 0) doc.addPage([200, 50], 'l');
                    doc.addImage(res.imageUrl, 'JPEG', 0, 0, 162, 50);

                    // Bílá info zóna
                    doc.setFillColor(255); doc.rect(162, 0, 38, 50, 'F');
                    doc.setDrawColor(230); doc.line(162, 0, 162, 50);

                    // HRÁTKY S FONTEM (Dynamická typografie)
                    const fontStyles = [
                        { font: "helvetica", weight: "bold", size: 28, charSpace: 1 },
                        { font: "courier", weight: "bold", size: 24, charSpace: 0 },
                        { font: "times", weight: "italic", size: 30, charSpace: 2 }
                    ];
                    const style = fontStyles[i];

                    doc.setFont(style.font, style.weight);
                    doc.setFontSize(style.size);
                    doc.setTextColor(20);
                    doc.text(name, 15, 25, { charSpace: style.charSpace });

                    // Doplňkový text pod názvem
                    doc.setFont("helvetica", "normal");
                    doc.setFontSize(8);
                    doc.setTextColor(100);
                    doc.text(`CONCEPT / ${res.styleName.toUpperCase()}`, 15, 33);

                    // Logo
                    if (logoData) doc.addImage(logoData, 'PNG', 130, 10, 25, 25);

                    // QR v tiskové zóně
                    doc.addImage(qrImg, 'PNG', 173, 31, 16, 16);
                    doc.setTextColor(150); doc.setFontSize(5);
                    doc.text("RELEASE 2026 | ABSTR-ID: " + Math.random().toString(36).substr(2,4).toUpperCase(), 168, 5, {angle: -90});
                    doc.text(qrUrl.replace('https://',''), 181, 28, {align: 'center'});
                });

                bar.style.width = "100%";
                doc.save(`Designer_Collection_${name}.pdf`);

            } catch (err) { alert("Chyba: " + err.message); }
            finally {
                btn.disabled = false;
                document.getElementById('loader').classList.add('hidden');
                bar.style.width = "0%";
            }
        }
    </script>
</body>
</html>
