<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Studio: Final Logo Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; color: #fff; }
        .input-box { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; width: 100%; outline: none; }
        .input-box:focus { border-color: #3b82f6; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="max-w-md w-full space-y-4">
        <header class="text-center py-4">
            <h1 class="text-3xl font-black italic tracking-tighter">STUDIO <span class="text-blue-500">AI</span></h1>
        </header>

        <div class="space-y-3">
            <input type="text" id="compName" value="SETOS spol., s.r.o." class="input-box font-bold">
            <input type="text" id="compDesc" value="Premium Cybernetic Electronics" class="input-box text-sm text-gray-400">
            <input type="text" id="qrLink" value="https://www.setos.cz" class="input-box text-blue-400 font-mono text-xs italic">
            
            <div id="logoDrop" class="relative border-2 border-dashed border-gray-800 rounded-2xl p-6 text-center transition-all bg-gray-900/50">
                <input type="file" id="logoInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-20">
                <div id="previewWrap" class="hidden mb-2 flex justify-center text-center">
                    <img id="logoPreview" src="" class="h-12 w-12 object-contain bg-white p-1 rounded shadow-lg">
                </div>
                <p id="uploadInfo" class="text-[10px] font-bold uppercase text-gray-500 tracking-widest">Klikněte pro přidání loga</p>
                <div id="logoStore" data-blob="" class="hidden"></div>
            </div>

            <button onclick="generateElitePDF()" id="genBtn" class="w-full bg-blue-600 py-5 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-all uppercase tracking-tighter">
                Generovat PDF s Logem
            </button>
            
            <p id="loadingMsg" class="hidden text-center text-blue-500 text-[10px] font-bold animate-pulse mt-2 uppercase">Vytvářím tiskové soubory...</p>
        </div>
    </div>

    <div id="qr-hidden" class="hidden"></div>

    <script>
        const { jsPDF } = window.jspdf;

        // HLAVNÍ OPRAVA: Nahrávání a uložení loga
        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = 400; canvas.height = 400;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = "#FFFFFF";
                    ctx.fillRect(0,0,400,400);
                    const s = Math.min(350/img.width, 350/img.height);
                    ctx.drawImage(img, (400-img.width*s)/2, (400-img.height*s)/2, img.width*s, img.height*s);
                    
                    const finalData = canvas.toDataURL('image/jpeg', 0.9);
                    
                    // Uložíme do neviditelného divu
                    document.getElementById('logoStore').setAttribute('data-blob', finalData);
                    
                    // UI zpětná vazba
                    document.getElementById('logoPreview').src = finalData;
                    document.getElementById('previewWrap').classList.remove('hidden');
                    document.getElementById('logoDrop').classList.add('border-green-500', 'bg-green-500/10');
                    document.getElementById('uploadInfo').innerText = "LOGO PŘIPRAVENO ✅";
                    document.getElementById('uploadInfo').classList.replace('text-gray-500', 'text-green-500');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        async function generateElitePDF() {
            const btn = document.getElementById('genBtn');
            const store = document.getElementById('logoStore');
            const logoData = store.getAttribute('data-blob'); // Vytáhneme uložené logo
            
            btn.disabled = true;
            document.getElementById('loadingMsg').classList.remove('hidden');

            try {
                // QR Generování
                const qrDiv = document.getElementById('qr-hidden');
                qrDiv.innerHTML = "";
                new QRCode(qrDiv, { text: document.getElementById('qrLink').value, width: 256, height: 256 });
                await new Promise(r => setTimeout(r, 600));
                const qrImg = qrDiv.querySelector('canvas').toDataURL("image/png");

                const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: [200, 50] });

                // Vygenerujeme 2 komplexní designy
                for (let i = 0; i < 2; i++) {
                    if (i > 0) doc.addPage([200, 50], 'l');

                    if (i === 0) { // DARK TECH
                        doc.setFillColor(10, 10, 15); doc.rect(0, 0, 200, 50, 'F');
                        doc.setDrawColor(30, 40, 80);
                        for(let x=0; x<160; x+=10) doc.line(x, 0, x+10, 50);
                        doc.setTextColor(255);
                    } else { // STUDIO WHITE
                        doc.setFillColor(255); doc.rect(0, 0, 200, 50, 'F');
                        doc.setDrawColor(240);
                        for(let y=0; y<50; y+=2) doc.line(0, y, 162, y);
                        doc.setTextColor(0);
                    }

                    // Texty
                    doc.setFontSize(24); doc.text(document.getElementById('compName').value.toUpperCase(), 15, 22);
                    doc.setFontSize(9); doc.setTextColor(0, 120, 255);
                    doc.text(document.getElementById('compDesc').value, 15, 30);

                    // VLOŽENÍ LOGA Z ÚLOŽIŠTĚ
                    if (logoData && logoData.length > 100) {
                        doc.setFillColor(255); doc.roundedRect(125, 10, 30, 30, 2, 2, 'F');
                        doc.addImage(logoData, 'JPEG', 127, 12, 26, 26);
                    }

                    // Tisková bílá zóna vpravo
                    doc.setFillColor(255); doc.rect(162, 0, 38, 50, 'F');
                    doc.setDrawColor(200); doc.line(162, 0, 162, 50);
                    doc.addImage(qrImg, 'PNG', 172, 31, 17, 17);
                    doc.setTextColor(100); doc.setFontSize(5);
                    doc.text("BATCH 2026 | PREMIUM | " + document.getElementById('compName').value, 168, 5, {angle: -90});
                }

                doc.save("Elite_Collection.pdf");
            } catch (err) {
                alert("Chyba: " + err);
            } finally {
                btn.disabled = false;
                document.getElementById('loadingMsg').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
