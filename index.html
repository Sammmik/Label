<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Neural Studio: Master Release</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030303; }
        .input-style { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 1rem; width: 100%; outline: none; transition: 0.3s; }
        .input-style:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59,130,246,0.3); }
    </style>
</head>
<body class="bg-black text-white min-h-screen p-4 flex items-center justify-center font-sans">

    <div class="max-w-md w-full bg-[#111] p-10 rounded-[2.5rem] shadow-2xl border border-white/5 relative overflow-hidden">
        <div class="absolute top-0 right-0 -mt-10 -mr-10 w-40 h-40 bg-blue-600/10 blur-[80px]"></div>
        
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent uppercase italic tracking-tighter">AI Studio</h1>
            <p class="text-cyan-500 text-[10px] tracking-[0.4em] uppercase mt-2 font-bold">Vercel Powered Label Engine</p>
        </header>

        <div class="space-y-5 relative z-10">
            <input type="text" id="compName" value="SETOS spol., s.r.o." class="input-style font-bold text-white">
            <input type="text" id="compDesc" value="Prémiová elektronika a technologie" class="input-style text-slate-300">
            <input type="text" id="qrLink" value="https://www.setos.cz" class="input-style text-cyan-400">
            
            <div class="bg-white/5 p-4 rounded-2xl border-2 border-dashed border-white/10 text-center hover:border-cyan-500/30 transition-all cursor-pointer">
                <p class="text-xs text-slate-500 uppercase font-bold">Nahrát logo pro AI analýzu</p>
            </div>

            <button onclick="generateMasterPDF()" id="genBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-6 rounded-[2rem] font-black text-xl shadow-[0_20px_50px_rgba(37,99,235,0.2)] transition-all active:scale-95 uppercase tracking-tighter">
                Generovat Kolekci
            </button>
            
            <p id="status" class="hidden text-center text-cyan-500 animate-pulse text-[10px] font-bold mt-4 uppercase">AI Renderuje tisková data...</p>
        </div>
        <div id="qr-hidden" class="hidden"></div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;

        async function generateMasterPDF() {
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');
            const name = document.getElementById('compName').value;
            const desc = document.getElementById('compDesc').value;
            const qrUrl = document.getElementById('qrLink').value;
            
            btn.disabled = true;
            status.classList.remove('hidden');

            try {
                // Generování QR (Otestováno)
                const qrDiv = document.getElementById('qr-hidden');
                qrDiv.innerHTML = "";
                new QRCode(qrDiv, { text: qrUrl, width: 256, height: 256 });
                await new Promise(r => setTimeout(r, 800));
                const qrImg = qrDiv.querySelector('canvas').toDataURL("image/png");

                const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: [200, 50] });

                for (let i = 0; i < 2; i++) {
                    if (i > 0) doc.addPage([200, 50], 'l');

                    // --- STRANA DESIGN 1 (PROFI DARK) ---
                    if (i === 0) {
                        doc.setFillColor(15, 20, 30); doc.rect(0, 0, 200, 50, 'F');
                        
                        // Prémiová typografie (Hierarchie)
                        doc.setTextColor(255); doc.setFontSize(26); doc.text(name.toUpperCase(), 15, 22);
                        doc.setTextColor(0, 150, 255); doc.setFontSize(9); doc.text(desc, 15, 30);
                        
                        // Zóna pro logo (Bílý box s průhledností - opraveno)
                        doc.setFillColor(255);
                        doc.setGState(new doc.GState({opacity: 0.03})); doc.roundedRect(125, 10, 30, 30, 2, 2, 'F');
                        
                        // Grafický vzor: Mřížka (Geometric Pattern)
                        doc.setGState(new doc.GState({opacity: 0.15})); doc.setDrawColor(0, 150, 255); doc.setLineWidth(0.1);
                        for(let x=0; x<160; x+=2) { doc.line(x, 0, x, 50); }
                        doc.setGState(new doc.GState({opacity: 1})); // Reset průhlednosti
                    
                    // --- STRANA DESIGN 2 (ULTRA WHITE) ---
                    } else {
                        doc.setFillColor(255); doc.rect(0, 0, 200, 50, 'F');
                        doc.setTextColor(0); doc.setFontSize(28); doc.text(name, 15, 25);
                    }

                    // --- SPOLEČNÉ PRVKY (Tisková data) ---
                    
                    // Bílá Info Zóna (Povinné zákonné údaje)
                    doc.setFillColor(255); doc.rect(162, 0, 38, 50, 'F');
                    doc.addImage(qrImg, 'PNG', 173, 31, 16, 16);
                    doc.setDrawColor(220); doc.line(162, 0, 162, 50);
                    
                    // Doplňkové texty v menším písmu
                    doc.setTextColor(150); doc.setFontSize(5);
                    doc.text("LAW INFO: 300ml | batch no. 2026", 168, 5, {angle: -90});
                    doc.text(qrUrl.replace('https://',''), 180, 28, {align: 'center'});
                }

                doc.save(`Kolekce_Premium_${name}.pdf`);

            } catch (err) {
                alert("Systémová chyba: " + err);
            } finally {
                btn.disabled = false;
                status.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
