<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Studio: Generative Engine Vercel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=JetBrains+Mono&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020205; color: #fff; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; }
        .input-ai { background: transparent; border: none; outline: none; width: 100%; color: #3b82f6; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; }
        .input-ai::placeholder { color: rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div class="max-w-md w-full space-y-4 pt-4">
        <header class="text-center">
            <h1 class="text-3xl font-black tracking-tighter italic">GENERATIVE <span class="text-blue-500">AI</span></h1>
            <p class="text-[9px] uppercase tracking-[0.3em] text-gray-500 font-bold italic">Vercel Backend Ready</p>
        </header>

        <div class="glass p-5 space-y-4 shadow-2xl">
            <div>
                <label class="text-[9px] uppercase font-black text-gray-500 mb-1 block">Cílové URL pro analýzu</label>
                <input type="text" id="compWeb" value="https://www.setos.cz" class="input-ai border-b border-blue-900/50 pb-2">
            </div>

            <div>
                <label class="text-[9px] uppercase font-black text-gray-500 mb-1 block mt-2">Sémantický popis firmy</label>
                <textarea id="compDesc" rows="2" class="input-ai border-b border-blue-900/50 pb-2">Distribuce prémiové elektroniky, mobilních technologií a lifestyle doplňků.</textarea>
            </div>

            <div id="logoDrop" class="relative border-2 border-dashed border-gray-800 rounded-xl p-4 text-center transition-all hover:bg-white/5 cursor-pointer mt-4">
                <input type="file" id="logoInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-20">
                <div id="previewWrap" class="hidden mb-2 flex justify-center"><img id="logoPreview" src="" class="h-10 w-10 object-contain bg-white rounded shadow-xl p-1"></div>
                <p id="uploadInfo" class="text-[10px] font-bold uppercase text-gray-400">Nahrát produktové logo</p>
                <div id="logoStore" data-blob="" class="hidden"></div>
            </div>

            <button onclick="runGenerativeEngine()" id="genBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black text-lg shadow-[0_0_30px_rgba(37,99,235,0.3)] active:scale-95 transition-all uppercase mt-4">
                Spustit Generátor Vzorů
            </button>
        </div>

        <div id="aiStatus" class="hidden space-y-2 px-2 pb-8">
            <div class="flex justify-between text-[9px] font-bold uppercase text-blue-400"><span id="aiStep">Inicializace sémantického jádra...</span><span id="aiPerc">0%</span></div>
            <div class="w-full bg-gray-900 h-1 rounded-full overflow-hidden"><div id="aiBar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div></div>
        </div>
    </div>

    <div id="qr-hidden" class="hidden"></div>

    <script>
        const { jsPDF } = window.jspdf;

        // Bezpečné uložení loga
        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 400; canvas.height = 400;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0,0,400,400);
                    const s = Math.min(360/img.width, 360/img.height);
                    ctx.drawImage(img, (400-img.width*s)/2, (400-img.height*s)/2, img.width*s, img.height*s);
                    const data = canvas.toDataURL('image/jpeg', 0.95);
                    
                    document.getElementById('logoStore').setAttribute('data-blob', data);
                    document.getElementById('logoPreview').src = data;
                    document.getElementById('previewWrap').classList.remove('hidden');
                    document.getElementById('uploadInfo').innerText = "DATA LOGA ULOŽENA ✅";
                    document.getElementById('uploadInfo').className = "text-[10px] font-bold text-green-500 uppercase tracking-widest";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Generativní Matematické Funkce pro jsPDF
        const PatternEngine = {
            // Vzor 1: Neuronová síť (Propojování bodů)
            drawNetwork(doc, r, g, b) {
                doc.setDrawColor(r, g, b);
                doc.setLineWidth(0.1);
                let points = [];
                for(let i=0; i<40; i++) points.push({x: Math.random()*162, y: Math.random()*50});
                
                for(let i=0; i<points.length; i++) {
                    doc.circle(points[i].x, points[i].y, 0.5, 'F');
                    for(let j=i+1; j<points.length; j++) {
                        let dist = Math.hypot(points[i].x - points[j].x, points[i].y - points[j].y);
                        if(dist < 25) doc.line(points[i].x, points[i].y, points[j].x, points[j].y);
                    }
                }
            },
            
            // Vzor 2: Datové vlny (Křivky a frekvence)
            drawWaves(doc, r, g, b) {
                doc.setDrawColor(r, g, b);
                for(let w=0; w<6; w++) {
                    doc.setLineWidth(Math.random() * 0.4 + 0.1);
                    let yOffset = Math.random() * 50;
                    for(let x=0; x<162; x+=2) {
                        let y = yOffset + Math.sin(x * 0.1 + w) * 10;
                        doc.circle(x, y, 0.2, 'F');
                    }
                }
            },

            // Vzor 3: Abstraktní fragmenty (Moderní lomená geometrie)
            drawFragments(doc, r, g, b) {
                doc.setDrawColor(r, g, b);
                for(let i=0; i<30; i++) {
                    doc.setLineWidth(Math.random() * 1.5);
                    let x = Math.random()*162;
                    let y = Math.random()*50;
                    let len = Math.random()*30 + 10;
                    doc.line(x, y, x + len, y - len/2);
                }
            }
        };

        async function runGenerativeEngine() {
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('aiStatus');
            const bar = document.getElementById('aiBar');
            const step = document.getElementById('aiStep');
            const perc = document.getElementById('aiPerc');
            
            const web = document.getElementById('compWeb').value;
            const desc = document.getElementById('compDesc').value;
            const logoData = document.getElementById('logoStore').getAttribute('data-blob');

            btn.disabled = true;
            status.classList.remove('hidden');

            const phases = [
                { s: "Rozpoznávání domény a SSL...", p: "25%" },
                { s: "Sémantická extrakce popisu...", p: "50%" },
                { s: "Výpočet generativních vzorů...", p: "75%" },
                { s: "Renderování grafiky s vysokým DPI...", p: "100%" }
            ];

            for(let phase of phases) {
                step.innerText = phase.s;
                bar.style.width = phase.p;
                perc.innerText = phase.p;
                await new Promise(r => setTimeout(r, 700)); // Simulace výpočtu serveru
            }

            try {
                // 1. Sémantická analýza klientského textu (Příprava na Vercel Backend)
                const analysisText = (web + " " + desc).toLowerCase();
                let theme = "MODERN";
                if (analysisText.includes("elektro") || analysisText.includes("tech") || analysisText.includes("it")) theme = "TECH";
                if (analysisText.includes("přírod") || analysisText.includes("bio") || analysisText.includes("eko")) theme = "ECO";

                // 2. Generování dynamického QR kódu
                const qrDiv = document.getElementById('qr-hidden');
                qrDiv.innerHTML = "";
                new QRCode(qrDiv, { text: web, width: 300, height: 300, colorDark : "#000000", colorLight : "#ffffff" });
                await new Promise(r => setTimeout(r, 600));
                const qrImg = qrDiv.querySelector('canvas').toDataURL("image/png");

                // 3. Sestavení PDF Vzorů
                const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: [200, 50] });

                // Extrakce jména firmy z URL pro branding
                let brandName = web.replace(/(^\w+:|^)\/\//, '').split('.')[0];
                brandName = brandName === 'www' ? web.split('.')[1] : brandName;
                brandName = brandName.toUpperCase() + " CORP.";

                for (let i = 0; i < 3; i++) {
                    if (i > 0) doc.addPage([200, 50], 'l');

                    // Aplikace generativních vzorů na základě sémantiky
                    if (i === 0) { 
                        // Vzor 1: Tmavá Síť (Neuronový design)
                        doc.setFillColor(8, 10, 15); doc.rect(0, 0, 200, 50, 'F');
                        PatternEngine.drawNetwork(doc, 0, 150, 255); // Modrá síť
                        doc.setTextColor(255);
                    } else if (i === 1) { 
                        // Vzor 2: Čistý Průmysl (Fragmenty)
                        doc.setFillColor(245, 245, 250); doc.rect(0, 0, 200, 50, 'F');
                        PatternEngine.drawFragments(doc, 150, 160, 180); // Šedé fragmenty
                        doc.setTextColor(10, 15, 30);
                    } else { 
                        // Vzor 3: Datový Tok (Vlny)
                        doc.setFillColor(15, 20, 25); doc.rect(0, 0, 200, 50, 'F');
                        PatternEngine.drawWaves(doc, 255, 50, 100); // Neónově červená vlna
                        doc.setTextColor(255);
                    }

                    // Dynamický Branding
                    doc.setFontSize(26); doc.text(brandName, 15, 22);
                    doc.setFontSize(8); 
                    doc.setTextColor(i === 1 ? 100 : 150);
                    doc.text(`AI KATEGORIE: ${theme} | GENR: ${Math.random().toString(36).substr(2, 5).toUpperCase()}`, 15, 30);

                    // Bezpečné Vložení Loga
                    if (logoData && logoData.length > 100) {
                        doc.setFillColor(255); doc.roundedRect(125, 10, 30, 30, 2, 2, 'F');
                        doc.addImage(logoData, 'JPEG', 127, 12, 26, 26);
                    }

                    // Standardizovaná Profesionální Zóna pro QR a Zákonné info
                    doc.setFillColor(255); doc.rect(162, 0, 38, 50, 'F');
                    doc.setDrawColor(200); doc.setLineWidth(0.5); doc.line(162, 0, 162, 50);
                    doc.addImage(qrImg, 'PNG', 172, 31, 16, 16);
                    doc.setTextColor(80); doc.setFontSize(5);
                    doc.text("LAW INFO: 300ml | BATCH 2026 | " + brandName, 168, 5, {angle: -90});
                    doc.text(web.replace(/(^\w+:|^)\/\//, '').substring(0, 25), 180, 28, {align: 'center'});
                }

                doc.save(`Vercel_GenArt_${brandName}.pdf`);

            } catch (err) {
                alert("Kritická chyba enginu: " + err);
            } finally {
                btn.disabled = false;
                status.classList.add('hidden');
                bar.style.width = "0%";
            }
        }
    </script>
</body>
</html>
