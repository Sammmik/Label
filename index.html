<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Studio: Mobile Fix v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #000; overflow-x: hidden; }
        .input-card { background: #111; border: 1px solid #222; border-radius: 1rem; transition: 0.3s; }
        .input-card:focus-within { border-color: #3b82f6; }
        input { background: transparent; border: none; outline: none; width: 100%; color: white; font-size: 0.9rem; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex items-start justify-center p-4">

    <div class="max-w-md w-full space-y-3 mt-2">
        <header class="text-center pb-2">
            <h1 class="text-2xl font-extrabold tracking-tighter text-white uppercase italic">Studio <span class="text-blue-500 text-not-italic">AI</span></h1>
            <p class="text-[10px] text-slate-500 tracking-widest uppercase">Mobile Stability Edition</p>
        </header>

        <div class="input-card px-4 py-2">
            <label class="block text-[9px] uppercase font-bold text-slate-500 mb-0.5">Značka / Firma</label>
            <input type="text" id="compName" value="SETOS spol., s.r.o.">
        </div>

        <div class="input-card px-4 py-2">
            <label class="block text-[9px] uppercase font-bold text-slate-500 mb-0.5">Produktová vize</label>
            <input type="text" id="compDesc" value="Prémiová elektronika a technologie">
        </div>

        <div class="input-card px-4 py-2 border-l-2 border-l-blue-500">
            <label class="block text-[9px] uppercase font-bold text-blue-500 mb-0.5">QR Odkaz (Web)</label>
            <input type="text" id="qrLink" value="https://www.setos.cz">
        </div>
        
        <div class="relative overflow-hidden bg-white/5 border-2 border-dashed border-slate-700 rounded-2xl p-4 flex items-center justify-center">
            <input type="file" id="logoInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-20">
            <div class="text-center">
                <div id="previewContainer" class="hidden mb-1 flex justify-center">
                    <img id="logoPreview" src="#" class="h-8 w-8 object-contain rounded border border-white/20 shadow-md">
                </div>
                <p id="uploadText" class="text-[10px] font-black uppercase text-slate-500 tracking-widest">Zvolit Logo</p>
            </div>
        </div>

        <button onclick="generateStablePDF()" id="genBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all uppercase tracking-tighter">
            Generovat PDF
        </button>
        
        <p id="statusMsg" class="hidden text-center text-blue-400 text-[10px] font-bold animate-pulse uppercase tracking-[0.2em] pt-2">AI Renderuje tisková data...</p>
    </div>

    <div id="qr-hidden" class="hidden"></div>
    <canvas id="temp-canvas" class="hidden"></canvas>

    <script>
        const { jsPDF } = window.jspdf;
        // Tady si budeme schovávat surová data loga
        let rawLogoData = null;

        // KROK 1: Rychlé uložení loga (nezasekne mobil)
        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const uploadText = document.getElementById('uploadText');
            
            if (file) {
                uploadText.innerText = "Zpracovávám...";
                const reader = new FileReader();
                reader.onload = function(event) {
                    // Surová data máme v paměti
                    rawLogoData = event.target.result;
                    
                    // Ukážeme náhled, aby uživatel viděl, že se to povedlo
                    const img = new Image();
                    img.onload = function() {
                        document.getElementById('logoPreview').src = event.target.result;
                        document.getElementById('previewContainer').classList.remove('hidden');
                        uploadText.innerText = "Logo Načteno ✅";
                        uploadText.classList.replace('text-slate-500', 'text-green-400');
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // KROK 2: Generování PDF (Všechno zpracování se děje až teď)
        async function generateStablePDF() {
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('statusMsg');
            const name = document.getElementById('compName').value;
            const desc = document.getElementById('compDesc').value;
            const link = document.getElementById('qrLink').value;
            
            btn.disabled = true;
            status.classList.remove('hidden');

            try {
                // Generování QR kódu (Otestováno)
                const qrDiv = document.getElementById('qr-hidden');
                qrDiv.innerHTML = "";
                new QRCode(qrDiv, { text: link, width: 256, height: 256 });
                
                // Čekání na vyrenderování QR kódu v paměti (0.6s)
                await new Promise(r => setTimeout(r, 600));
                const qrCanvas = qrDiv.querySelector('canvas');
                if (!qrCanvas) throw new Error("QR kód se nepodařilo vygenerovat");
                const qrImg = qrCanvas.toDataURL("image/png");

                // --- ZPRACOVÁNÍ LOGA PRO TISK (Děláme až teď, na pozadí) ---
                let finalLogoData = null;
                if (rawLogoData) {
                    finalLogoData = await new Promise((resolve) => {
                        const img = new Image();
                        img.onload = () => {
                            // Použijeme canvas pro ořez a bílé pozadí
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            canvas.width = 400; canvas.height = 400;
                            
                            // Bílé pozadí (pro čitelnost loga na tmavých designech)
                            ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0,0,400,400);
                            
                            // Výpočet poměru stran a vložení loga
                            const scale = Math.min(360/img.width, 360/img.height);
                            ctx.drawImage(img, (400-img.width*scale)/2, (400-img.height*scale)/2, img.width*scale, img.height*scale);
                            
                            // Převod na finální obrázek
                            resolve(canvas.toDataURL('image/jpeg', 0.9));
                        };
                        img.src = rawLogoData; // Použijeme dříve uložená surová data
                    });
                }

                // --- SESTAVENÍ PDF ---
                const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: [200, 50] });

                for (let i = 0; i < 3; i++) {
                    if (i > 0) doc.addPage([200, 50], 'l');

                    // DESIGNY (Procedurální tvary)
                    if (i === 0) { // Tech Blue
                        doc.setFillColor(5, 10, 25); doc.rect(0, 0, 200, 50, 'F');
                        doc.setDrawColor(0, 100, 255); doc.setLineWidth(0.2);
                        for(let x=0; x<160; x+=15) { doc.line(x, 0, x+20, 50); doc.line(x+20, 0, x, 50); }
                        doc.setTextColor(255);
                    } else if (i === 1) { // Gallery White
                        doc.setFillColor(255); doc.rect(0, 0, 200, 50, 'F');
                        doc.setTextColor(0);
                    } else { // Cyber Neon
                        doc.setFillColor(15, 15, 15); doc.rect(0, 0, 200, 50, 'F');
                        doc.setFillColor(59, 130, 246); doc.rect(0, 0, 5, 50, 'F');
                        doc.setTextColor(255);
                    }

                    // Textové prvky (Podpora diakritiky)
                    doc.setFontSize(24); doc.text(name.toUpperCase(), 15, 22);
                    doc.setFontSize(10); 
                    doc.setTextColor(i === 1 ? 120 : 100, 150, 255);
                    doc.text(desc, 15, 30);

                    // --- VLOŽENÍ LOGA ---
                    if (finalLogoData) {
                        doc.setFillColor(255); doc.roundedRect(125, 10, 30, 30, 2, 2, 'F');
                        // Vkládáme finální, zpracovaný obrázek
                        doc.addImage(finalLogoData, 'JPEG', 127, 12, 26, 26);
                    }

                    // Pravá bílá info zóna (Standard pro produktové etikety)
                    doc.setFillColor(255); doc.rect(162, 0, 38, 50, 'F');
                    doc.addImage(qrImg, 'PNG', 173, 31, 16, 16);
                    doc.setDrawColor(200); doc.line(162, 0, 162, 50);
                    
                    doc.setTextColor(100); doc.setFontSize(5);
                    doc.text("LAW INFO: 300ml | " + name.toUpperCase(), 168, 5, {angle: -90});
                    // Odkaz vpravo pro čitelnost
                    doc.text(link.replace('https://','').substring(0, 24), 181, 28, {align: 'center'});
                }

                doc.save(`Etikety_AI_Studio_${Date.now()}.pdf`);

            } catch (err) {
                alert("Chyba při tvorbě PDF: " + err);
            } finally {
                btn.disabled = false;
                status.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
