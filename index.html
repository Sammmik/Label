<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio: Server-Side Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-[#020205] text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass p-10 rounded-[3rem] shadow-[0_0_50px_rgba(0,0,0,0.5)]">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black italic tracking-tighter bg-gradient-to-br from-white to-slate-500 bg-clip-text text-transparent">STUDIO AI</h1>
            <p class="text-[9px] uppercase tracking-[0.5em] text-blue-500 font-bold mt-2">Server-Powered Generation</p>
        </header>

        <div class="space-y-6">
            <div class="relative">
                <input type="text" id="compName" value="SETOS spol., s.r.o." class="w-full bg-white/5 p-5 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-black text-lg transition-all" placeholder="Název značky">
            </div>

            <div class="relative">
                <textarea id="compDesc" rows="2" class="w-full bg-white/5 p-5 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 text-slate-400 text-sm" placeholder="Popište vizi produktu (např. Futurismus, karbon, neon)"></textarea>
            </div>

            <div class="relative">
                <input type="text" id="qrLink" value="https://www.setos.cz" class="w-full bg-white/5 p-5 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 text-blue-400 font-mono text-xs">
            </div>

            <div class="bg-blue-600/5 p-6 rounded-3xl border-2 border-dashed border-blue-500/20 text-center hover:border-blue-500/50 transition-all">
                <input type="file" id="logoInput" accept="image/*" class="hidden">
                <label for="logoInput" class="cursor-pointer text-xs font-bold text-slate-500 uppercase tracking-widest">Nahrát logo značky</label>
            </div>

            <button onclick="generateDesignerPDF()" id="genBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-[2rem] font-black text-xl shadow-[0_20px_40px_rgba(37,99,235,0.3)] transition-all active:scale-95 uppercase tracking-tighter">
                Vytvořit Design
            </button>
            
            <div id="status" class="hidden text-center space-y-3">
                <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden">
                    <div id="progress" class="bg-blue-500 h-full w-0 transition-all duration-1000"></div>
                </div>
                <p id="statusText" class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Analýza požadavků...</p>
            </div>
        </div>
    </div>

    <div id="qr-render" class="hidden"></div>

    <script>
        const { jsPDF } = window.jspdf;

        async function generateDesignerPDF() {
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');
            const progress = document.getElementById('progress');
            const statusText = document.getElementById('statusText');
            
            btn.disabled = true;
            status.classList.remove('hidden');

            // --- Simulace komunikace se serverem (Workflow) ---
            const steps = [
                { t: "AI Engine: Generování textur...", p: "30%" },
                { t: "Server: Rendering vrstev...", p: "60%" },
                { t: "Finální kompozice...", p: "90%" }
            ];

            for (let step of steps) {
                statusText.innerText = step.t;
                progress.style.width = step.p;
                await new Promise(r => setTimeout(r, 800));
            }

            try {
                // QR generování
                const qrDiv = document.getElementById('qr-render');
                qrDiv.innerHTML = "";
                new QRCode(qrDiv, { text: document.getElementById('qrLink').value, width: 300, height: 300 });
                await new Promise(r => setTimeout(r, 500));
                const qrImg = qrDiv.querySelector('canvas').toDataURL("image/png");

                const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: [200, 50] });

                // DESIGN 1: THE LIQUID METAL (Futuristický produktový design)
                doc.setFillColor(5, 5, 10); doc.rect(0, 0, 200, 50, 'F');
                // Simulace gradientu/stínů
                for(let i=0; i<50; i++) {
                    doc.setDrawColor(10 + i, 15 + i, 30 + i);
                    doc.line(0, i, 162, i);
                }
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(26); doc.text(document.getElementById('compName').value.toUpperCase(), 15, 22);
                doc.setTextColor(0, 150, 255); doc.setFontSize(9); doc.text("> SYSTEM STATUS: PREMIUM EDITION", 15, 30);

                // DESIGN 2: THE STUDIO WHITE (Minimalismus s texturou)
                doc.addPage([200, 50], 'l');
                doc.setFillColor(255, 255, 255); doc.rect(0, 0, 200, 50, 'F');
                doc.setDrawColor(230); doc.setLineWidth(0.1);
                for(let i=0; i<160; i+=2) doc.line(i, 0, i, 50); // Jemný rastr
                doc.setTextColor(0, 0, 0); doc.setFontSize(28); doc.text(document.getElementById('compName').value, 15, 25);

                // Společné prvky (Tisková data)
                for(let p=1; p<=2; p++) {
                    doc.setPage(p);
                    doc.setFillColor(255, 255, 255); doc.rect(162, 0, 38, 50, 'F');
                    doc.setDrawColor(200); doc.line(162, 0, 162, 50);
                    doc.addImage(qrImg, 'PNG', 172, 32, 15, 15);
                    doc.setTextColor(100); doc.setFontSize(5);
                    doc.text("LAW: 300ml | 2026 SERIES | MADE BY AI", 168, 5, {angle: -90});
                }

                doc.save("Designer_Labels_Pro.pdf");

            } catch (e) {
                alert(err);
            } finally {
                btn.disabled = false;
                status.classList.add('hidden');
                progress.style.width = "0%";
            }
        }
    </script>
</body>
</html>
