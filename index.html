<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Studio: Premium Logo Edition Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030303; }
        .input-style { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; padding: 1rem; width: 100%; outline: none; transition: 0.3s; color: white;}
        .input-style:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59,130,246,0.3); }
    </style>
</head>
<body class="bg-black text-white min-h-screen p-4 flex items-start justify-center font-sans">

    <div class="max-w-md w-full bg-[#111] p-8 rounded-[2.5rem] shadow-2xl border border-white/5 relative overflow-hidden mt-2">
        <div class="absolute top-0 left-0 -mt-10 -ml-10 w-40 h-40 bg-blue-600/10 blur-[80px]"></div>
        
        <header class="text-center mb-6 relative z-10">
            <h1 class="text-3xl font-black bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent uppercase italic tracking-tighter">AI Studio</h1>
            <p class="text-slate-500 text-[9px] tracking-[0.4em] uppercase mt-2 font-bold">Premium Label Engine</p>
        </header>

        <div class="space-y-4 relative z-10">
            <div>
                <label class="text-[9px] uppercase font-bold text-slate-500 ml-2">Název značky</label>
                <input type="text" id="compName" value="SETOS spol., s.r.o." class="input-style font-bold py-3">
            </div>

            <div>
                <label class="text-[9px] uppercase font-bold text-slate-500 ml-2">Produktová řada</label>
                <input type="text" id="compDesc" value="Prémiová elektronika a technologie" class="input-style text-slate-300 text-sm py-3">
            </div>

            <div>
                <label class="text-[9px] uppercase font-bold text-blue-500 ml-2">QR Odkaz</label>
                <input type="text" id="qrLink" value="https://www.setos.cz" class="input-style text-blue-400 font-mono text-xs py-3">
            </div>
            
            <div id="logoDrop" class="relative bg-white/5 p-4 rounded-2xl border-2 border-dashed border-white/20 text-center transition-all">
                <input type="file" id="logoInput" accept="image/png, image/jpeg" class="absolute inset-0 opacity-0 cursor-pointer z-20">
                <div class="flex flex-col items-center justify-center space-y-2">
                    <img id="logoPreview" src="" class="hidden h-10 w-10 object-contain bg-white/10 rounded-lg p-1">
                    <p id="uploadText" class="text-xs text-slate-400 uppercase font-bold tracking-widest">Nahrát logo (PNG)</p>
                </div>
                <div id="logoStore" data-blob="" class="hidden"></div>
            </div>

            <button onclick="generateMasterPDF()" id="genBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-[2rem] font-black text-xl shadow-[0_10px_30px_rgba(37,99,235,0.3)] transition-all active:scale-95 uppercase tracking-tighter mt-4">
                Generovat Kolekci
            </button>
            
            <p id="status" class="hidden text-center text-blue-400 animate-pulse text-[10px] font-bold mt-4 uppercase tracking-widest">AI Renderuje data...</p>
        </div>
        <div id="qr-hidden" class="hidden"></div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;

        // ZPRACOVÁNÍ LOGA (s podporou průhlednosti pro tisk bez bílých čtverců)
        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('uploadText').innerText = "Zpracovávám...";
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = 400; canvas.height = 400;
                    const ctx = canvas.getContext('2d');
                    
                    ctx.clearRect(0, 0, 400, 400); 
                    
                    const s = Math.min(380/img.width, 380/img.height);
                    ctx.drawImage(img, (400-img.width*s)/2, (400-img.height*s)/2, img.width*s, img.height*s);
                    
                    const data = canvas.toDataURL('image/png');
                    document.getElementById('logoStore').setAttribute('data-blob', data);
                    
                    document.getElementById('logoPreview').src = data;
                    document.getElementById('logoPreview').classList.remove('hidden');
                    document.getElementById('uploadText').innerText = "LOGO PŘIPRAVENO ✅";
                    document.getElementById('uploadText').classList.replace('text-slate-400', 'text-green-400');
                    document.getElementById('logoDrop').classList.add('border-green-500/50', 'bg-green-500/5');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // GENEROVÁNÍ PDF
        async function generateMasterPDF() {
            const btn = document.getElementById('genBtn');
            const status = document.getElementById('status');
            const name = document.getElementById('compName').value;
            const desc = document.getElementById('compDesc').value;
            const qrUrl = document.getElementById('qrLink').value;
            const logoData = document.getElementById('logoStore').getAttribute('data-blob');
            
            btn.disabled = true;
            status.classList.remove('hidden');

            try {
                const qrDiv = document.getElementById('qr-hidden');
                qrDiv.innerHTML = "";
                new QRCode(qrDiv, { text: qrUrl, width: 300, height: 300 });
                await new Promise(r => setTimeout(r, 600));
                const qrImg = qrDiv.querySelector('canvas').toDataURL("image/png");

                const doc = new jsPDF({ orientation: 'l', unit: 'mm', format: [200, 50] });

                for (let i = 0; i < 2; i++) {
                    if (i > 0) doc.addPage([200, 50], 'l');

                    let textStartX = 15;

                    // --- STRANA 1: PROFI DARK ---
                    if (i === 0) {
                        doc.setFillColor(15, 18, 25); doc.rect(0, 0, 200, 50, 'F');
                        
                        doc.setDrawColor(30, 40, 60); doc.setLineWidth(0.1);
                        for(let x=0; x<160; x+=3) doc.line(x, 0, x, 50);
                        for(let y=0; y<50; y+=3) doc.line(0, y, 160, y);
                        
                        doc.setTextColor(255, 255, 255);
                    // --- STRANA 2: ULTRA WHITE ---
                    } else {
                        doc.setFillColor(255, 255, 255); doc.rect(0, 0, 200, 50, 'F');
                        doc.setTextColor(0, 0, 0);
                    }

                    // Vložení transparentního loga
                    if (logoData && logoData.length > 100) {
                        doc.addImage(logoData, 'PNG', 12, 10, 30, 30);
                        textStartX = 48; // Odsazení textu vedle loga
                    }

                    // Zápis textů
                    doc.setFontSize(26); 
                    doc.text(name.toUpperCase(), textStartX, 24);
                    
                    // OPRAVENÁ BARVA: Jasně definované argumenty
                    if (i === 0) {
                        doc.setTextColor(0, 150, 255);
                    } else {
                        doc.setTextColor(100, 100, 100);
                    }
                    doc.setFontSize(9); 
                    doc.text(desc, textStartX, 32);

                    // --- ZÁKONNÁ INFO ZÓNA (Pravý sloupec) ---
                    doc.setFillColor(255, 255, 255); doc.rect(162, 0, 38, 50, 'F');
                    doc.setDrawColor(220, 220, 220); doc.setLineWidth(0.3); doc.line(162, 0, 162, 50);
                    doc.addImage(qrImg, 'PNG', 173, 31, 16, 16);
                    
                    doc.setTextColor(100, 100, 100); doc.setFontSize(5);
                    doc.text("PRODUCT OF EU | 300ml | BATCH 2026", 168, 5, {angle: -90});
                    doc.text(qrUrl.replace(/(^\w+:|^)\/\//, '').substring(0, 25), 181, 28, {align: 'center'});
                }

                doc.save(`Premium_Etikety_${name.replace(/\s+/g, '_')}.pdf`);

            } catch (err) {
                alert("Systémová chyba: " + err);
            } finally {
                btn.disabled = false;
                status.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
